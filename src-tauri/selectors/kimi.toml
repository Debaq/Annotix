name = "Kimi"
url = "https://kimi.moonshot.cn/"
login_check = ".chat-input"

[selectors.chat_input]
css = "textarea[data-testid='chat-input']"
fallback = ".chat-input textarea"
wait_timeout_ms = 10000
description = "Campo de texto del chat"

[selectors.send_button]
css = "button[data-testid='send-button']"
fallback = ".send-btn"
wait_timeout_ms = 3000
description = "Botón enviar mensaje"

[selectors.new_chat]
css = "button[data-testid='new-chat']"
fallback = ".new-chat-btn"
wait_timeout_ms = 5000
description = "Botón nueva conversación"

[selectors.message_list]
css = ".chat-message-list"
fallback = ".message-container"
wait_timeout_ms = 5000
description = "Lista de mensajes"

[selectors.last_message]
css = ".chat-message-list .message:last-child .message-content"
fallback = ".message-container > div:last-child .content"
wait_timeout_ms = 10000
description = "Último mensaje de la conversación"

[selectors.typing_indicator]
css = ".typing-indicator"
fallback = ".loading-indicator"
wait_timeout_ms = 2000
description = "Indicador de que el modelo está respondiendo"

[selectors.model_selector]
css = ".model-selector"
fallback = "button[data-testid='model-select']"
wait_timeout_ms = 5000
description = "Selector de modelo"
