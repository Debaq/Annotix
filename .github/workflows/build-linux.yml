name: Build Linux

on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-linux:
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libavcodec-dev \
            libavformat-dev \
            libavutil-dev \
            libswscale-dev \
            libswresample-dev \
            libavfilter-dev \
            libavdevice-dev \
            pkg-config \
            clang

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Install dependencies
        run: npm ci

      - name: Build Tauri (binary + AppImage)
        run: npx tauri build --bundles appimage

      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: annotix-linux-binary
          path: src-tauri/target/release/annotix
          retention-days: 30

      - name: Upload AppImage
        uses: actions/upload-artifact@v4
        with:
          name: annotix-linux-appimage
          path: src-tauri/target/release/bundle/appimage/*.AppImage
          retention-days: 30

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          name: Annotix ${{ github.ref_name }}
          files: |
            src-tauri/target/release/annotix
            src-tauri/target/release/bundle/appimage/*.AppImage
