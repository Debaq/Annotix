name: Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-linux:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Read version from VERSION file
        run: echo "APP_VERSION=$(cat VERSION | tr -d '[:space:]')" >> $GITHUB_ENV

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            pkg-config \
            clang \
            nasm

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Install dependencies
        run: npm ci

      - name: Generate build info
        run: |
          BUILD_DATE=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          printf '// Auto-generado por CI\nexport const BUILD_NUMBER = 0;\nexport const BUILD_CODE = "%s";\nexport const BUILD_DATE = "%s";\n' "${{ github.ref_name }}" "$BUILD_DATE" > src/lib/buildInfo.ts

      - name: Generate changelog
        run: |
          python3 -c "
          import json, subprocess
          commits = []
          result = subprocess.run(['git', 'log', '--oneline', '-30', '--format=%h|%s'], capture_output=True, text=True)
          for line in result.stdout.strip().split('\n'):
              if '|' in line:
                  h, m = line.split('|', 1)
                  commits.append({'hash': h, 'message': m})
          with open('src/lib/changelog.ts', 'w') as f:
              f.write('// Auto-generado por CI\n')
              f.write('export const CHANGELOG: { hash: string; message: string }[] = ' + json.dumps(commits, ensure_ascii=False) + ';\n')
          "

      - name: Build Tauri (binary + AppImage)
        run: npx tauri build --bundles appimage
        env:
          CARGO_HTTP_TIMEOUT: 300
          CARGO_NET_RETRY: 5

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: annotix-linux
          path: |
            src-tauri/target/release/annotix
            src-tauri/target/release/bundle/appimage/*.AppImage
          retention-days: 30

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Read version from VERSION file
        shell: pwsh
        run: |
          $version = (Get-Content VERSION).Trim()
          echo "APP_VERSION=$version" >> $env:GITHUB_ENV

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Install LLVM 18
        uses: KyleMayes/install-llvm-action@v2
        with:
          version: "18"

      - name: Install nasm (for FFmpeg static build)
        shell: pwsh
        run: choco install nasm -y

      - name: Setup MSYS2 in PATH (needed by ffmpeg ./configure)
        shell: pwsh
        run: echo "C:\msys64\usr\bin" >> $env:GITHUB_PATH

      - name: Install dependencies
        run: npm ci

      - name: Generate build info
        shell: pwsh
        run: |
          $date = (Get-Date).ToUniversalTime().ToString("yyyy-MM-ddTHH:mm:ssZ")
          "// Auto-generado por CI`nexport const BUILD_NUMBER = 0;`nexport const BUILD_CODE = `"${{ github.ref_name }}`";`nexport const BUILD_DATE = `"$date`";" | Set-Content src/lib/buildInfo.ts

      - name: Generate changelog
        shell: pwsh
        run: |
          $log = git log --oneline -30 --format="%h|%s"
          $commits = @()
          foreach ($line in $log) {
              $parts = $line -split '\|', 2
              if ($parts.Count -eq 2) {
                  $commits += @{ hash = $parts[0]; message = $parts[1] }
              }
          }
          $json = $commits | ConvertTo-Json -Compress -AsArray
          "// Auto-generado por CI`nexport const CHANGELOG: { hash: string; message: string }[] = $json;" | Set-Content src/lib/changelog.ts

      - name: Build Tauri
        run: npx tauri build
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          LIBCLANG_PATH: ${{ env.LLVM_PATH }}/lib
          CARGO_HTTP_TIMEOUT: 300
          CARGO_NET_RETRY: 5

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: annotix-windows
          path: |
            src-tauri/target/release/bundle/nsis/*.exe
            src-tauri/target/release/bundle/msi/*.msi
          retention-days: 30

  release:
    needs: [build-linux, build-windows]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v4

      - name: Read version
        run: echo "APP_VERSION=$(cat VERSION | tr -d '[:space:]')" >> $GITHUB_ENV

      - name: Download Linux artifacts
        uses: actions/download-artifact@v4
        with:
          name: annotix-linux
          path: dist/linux

      - name: Download Windows artifacts
        uses: actions/download-artifact@v4
        with:
          name: annotix-windows
          path: dist/windows

      - name: List artifacts
        run: find dist -type f | head -20

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: Annotix v${{ env.APP_VERSION }}
          generate_release_notes: true
          files: |
            dist/linux/annotix
            dist/linux/bundle/appimage/*.AppImage
            dist/windows/nsis/*.exe
            dist/windows/msi/*.msi
