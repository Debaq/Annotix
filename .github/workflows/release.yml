name: Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-linux:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Read version from VERSION file
        run: echo "APP_VERSION=$(cat VERSION | tr -d '[:space:]')" >> $GITHUB_ENV

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            pkg-config \
            clang \
            nasm

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Install dependencies
        run: npm ci

      - name: Generate build info
        run: |
          BUILD_DATE=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          BUILD_COMMIT=$(git rev-parse --short HEAD)
          printf '// Auto-generado por CI\nexport const BUILD_NUMBER = 0;\nexport const BUILD_CODE = "%s";\nexport const BUILD_DATE = "%s";\nexport const BUILD_COMMIT = "%s";\n' "${{ github.ref_name }}" "$BUILD_DATE" "$BUILD_COMMIT" > src/lib/buildInfo.ts

      - name: Build Tauri (binary + AppImage)
        run: npx tauri build --bundles appimage
        env:
          CARGO_HTTP_TIMEOUT: 300
          CARGO_NET_RETRY: 5

      - name: Rename artifacts with version and platform
        run: |
          mv src-tauri/target/release/annotix \
             src-tauri/target/release/annotix-v${APP_VERSION}-linux-x86_64.bin
          for f in src-tauri/target/release/bundle/appimage/*.AppImage; do
            base=$(basename "$f")
            if ! echo "$base" | grep -q "$APP_VERSION"; then
              mv "$f" "$(dirname "$f")/Annotix-v${APP_VERSION}-linux-x86_64.AppImage"
            fi
          done

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: annotix-linux
          path: |
            src-tauri/target/release/annotix-v*.bin
            src-tauri/target/release/bundle/appimage/*.AppImage
          retention-days: 30

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Read version from VERSION file
        shell: pwsh
        run: |
          $version = (Get-Content VERSION).Trim()
          echo "APP_VERSION=$version" >> $env:GITHUB_ENV

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Install LLVM 18
        uses: KyleMayes/install-llvm-action@v2
        with:
          version: "18"

      - name: Download pre-built FFmpeg (shared libs + headers)
        shell: pwsh
        run: |
          $url = "https://github.com/BtbN/FFmpeg-Builds/releases/download/latest/ffmpeg-n7.1-latest-win64-gpl-shared-7.1.zip"
          Invoke-WebRequest -Uri $url -OutFile ffmpeg.zip
          Expand-Archive ffmpeg.zip -DestinationPath ffmpeg-tmp
          $dir = (Get-ChildItem ffmpeg-tmp -Directory)[0].FullName
          Move-Item $dir D:\ffmpeg
          echo "FFMPEG_DIR=D:\ffmpeg" >> $env:GITHUB_ENV

      - name: Bundle FFmpeg DLLs con el instalador
        shell: pwsh
        run: |
          Copy-Item D:\ffmpeg\bin\*.dll src-tauri\
          $conf = Get-Content src-tauri\tauri.conf.json -Raw | ConvertFrom-Json
          $dlls = Get-ChildItem src-tauri\*.dll | ForEach-Object { $_.Name }
          $conf.bundle | Add-Member -NotePropertyName "resources" -NotePropertyValue $dlls -Force
          $conf | ConvertTo-Json -Depth 10 | Set-Content src-tauri\tauri.conf.json
          Write-Host "DLLs bundled: $($dlls -join ', ')"

      - name: Install dependencies
        run: npm ci

      - name: Generate build info
        shell: pwsh
        run: |
          $date = (Get-Date).ToUniversalTime().ToString("yyyy-MM-ddTHH:mm:ssZ")
          $commit = (git rev-parse --short HEAD)
          "// Auto-generado por CI`nexport const BUILD_NUMBER = 0;`nexport const BUILD_CODE = `"${{ github.ref_name }}`";`nexport const BUILD_DATE = `"$date`";`nexport const BUILD_COMMIT = `"$commit`";" | Set-Content src/lib/buildInfo.ts

      - name: Build Tauri (sin ffmpeg-build, usa FFMPEG_DIR pre-compilado)
        run: npx tauri build -- --no-default-features
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          LIBCLANG_PATH: ${{ env.LLVM_PATH }}/lib
          CARGO_HTTP_TIMEOUT: 300
          CARGO_NET_RETRY: 5

      - name: Rename Windows artifacts with version
        shell: pwsh
        run: |
          Get-ChildItem src-tauri/target/release/bundle/nsis/*.exe | ForEach-Object {
            $newName = "Annotix-v$env:APP_VERSION-windows-x86_64-setup.exe"
            Rename-Item $_.FullName $newName
          }
          Get-ChildItem src-tauri/target/release/bundle/msi/*.msi | ForEach-Object {
            $newName = "Annotix-v$env:APP_VERSION-windows-x86_64.msi"
            Rename-Item $_.FullName $newName
          }

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: annotix-windows
          path: |
            src-tauri/target/release/bundle/nsis/*.exe
            src-tauri/target/release/bundle/msi/*.msi
          retention-days: 30

  release:
    needs: [build-linux, build-windows]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v4

      - name: Read version
        run: echo "APP_VERSION=$(cat VERSION | tr -d '[:space:]')" >> $GITHUB_ENV

      - name: Download Linux artifacts
        uses: actions/download-artifact@v4
        with:
          name: annotix-linux
          path: dist/linux

      - name: Download Windows artifacts
        uses: actions/download-artifact@v4
        with:
          name: annotix-windows
          path: dist/windows

      - name: List artifacts
        run: find dist -type f | head -20

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: Annotix v${{ env.APP_VERSION }}
          generate_release_notes: true
          files: |
            dist/linux/annotix-v*.bin
            dist/linux/bundle/appimage/*.AppImage
            dist/windows/nsis/*.exe
            dist/windows/msi/*.msi
